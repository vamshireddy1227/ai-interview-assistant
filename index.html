<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div id="avatar" class="avatar">👤</div>

    <h1>🤖 AI Interview Assistant</h1>

    <input
        type="text"
        id="name"
        placeholder="Enter Your Name">

    <br><br>

    <select id="category" onchange="changeCategory()">
        <option value="HR">HR</option>
        <option value="Python">Python</option>
        <option value="Technical">Technical</option>
        <option value="C++">C++</option>
        <option value="Java">Java</option>
        <option value="Data Structures">Data Structures</option>
    </select>

    <div class="summary-section">
        <div class="summary-item">
            <label>Name</label>
            <div id="summaryName" class="summary-output">-</div>
        </div>

        <div class="summary-item">
            <label>Category</label>
            <div id="summaryCategory" class="summary-output">HR</div>
        </div>

        <div class="summary-item">
            <label>Score</label>
            <div id="summaryScore" class="summary-output">0/50</div>
        </div>
    </div>

    <br><br>

    <button id="startBtn" onclick="startTest()">
        ▶️ Start Test
    </button>

    <button onclick="toggleDarkMode()">
        🌙 Dark Mode
    </button>

    <br><br>

    <h3>
        ⏰ Time Left:
        <span id="timer">30</span>s
    </h3>

    <div class="question-counter-box">
        <h3>
            Question
            <span id="questionNumber">1</span>/5
        </h3>
    </div>

    <div class="progress-bar">
        <div id="progress"></div>
    </div>

    <h3>Question</h3>

    <div id="question" class="question-box">
        Tell me about yourself.
    </div>

    <button onclick="speakQuestion()">
        🔊 Read Question
    </button>

    <br><br>

    <textarea
        id="answer"
        rows="6"
        placeholder="Type your answer here">
    </textarea>

    <br><br>

    <button onclick="startVoice()">
        🎤 Voice Input
    </button>

    <button onclick="nextQuestion()">
        Submit
    </button>

    <br><br>

    <h2 id="score">
        Score: 0/10
    </h2>

    <p id="feedback">
        Feedback will appear here...
    </p>

    <br>

    <button onclick="downloadReport()">
        📄 Download Report
    </button>

    <button onclick="downloadCertificate()">
        🏆 Download Certificate
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
